<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - {{ admin_title | default('Admin') }}</title>
    <script>
        (function() {
            var theme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-bs-theme', theme);
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ static_url }}/css/style.css" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-base);
            position: relative;
            overflow: hidden;
        }
        .login-wrapper::before {
            content: '';
            position: absolute;
            top: -200px;
            right: -150px;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        .login-wrapper::after {
            content: '';
            position: absolute;
            bottom: -200px;
            left: -150px;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }
        .login-box {
            width: 400px;
            max-width: calc(100vw - 2rem);
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            box-shadow: 0 12px 40px var(--shadow);
            padding: 2.5rem 2rem;
            position: relative;
            z-index: 1;
        }
        .login-icon-wrap {
            width: 52px;
            height: 52px;
            border-radius: 0.75rem;
            background: rgba(16, 185, 129, 0.12);
            border: 1px solid rgba(16, 185, 129, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.75rem;
        }
        .login-icon-wrap i {
            font-size: 1.4rem;
            color: var(--accent);
        }
        .login-title {
            text-align: center;
            margin-bottom: 1.75rem;
        }
        .login-title h4 {
            color: var(--text);
            font-weight: 700;
            font-size: 1.2rem;
            margin: 0 0 0.2rem;
        }
        .login-title p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin: 0;
        }
        .login-box .form-label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
        }
        .login-box .input-group-text {
            background: var(--bg-elevated);
            border-color: var(--border);
            color: var(--text-dim);
        }
        .login-box .form-control {
            background: var(--bg-base);
            border-color: var(--border);
            color: var(--text);
            padding: 0.55rem 0.75rem;
        }
        .login-box .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 0.2rem var(--accent-glow);
            background: var(--bg-base);
            color: var(--text);
        }
        .login-box .btn-primary {
            padding: 0.55rem 1rem;
            font-weight: 600;
        }
        .login-sso-note {
            text-align: center;
            margin-top: 1.25rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 0.72rem;
        }
        .login-theme-btn {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <!-- Theme toggle -->
        <div class="login-theme-btn">
            <button class="btn btn-sm theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
                <i class="bi bi-sun-fill theme-icon-light"></i>
                <i class="bi bi-moon-fill theme-icon-dark"></i>
            </button>
        </div>

        <div class="login-box">
            <!-- Brand -->
            <div class="login-title">
                <div class="login-icon-wrap">
                    <i class="bi bi-hdd-rack"></i>
                </div>
                <h4>{{ admin_title | default('Admin') }}</h4>
                <p>Sign in to your account</p>
            </div>

            {% if error %}
            <div class="alert alert-danger d-flex align-items-center py-2 px-3 mb-3" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2 flex-shrink-0"></i>
                <small>{{ error }}</small>
            </div>
            {% endif %}

            <form method="post" action="/login" id="login-form">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="username" name="username"
                               placeholder="Enter your username" required autofocus
                               value="{{ username or '' }}">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Enter your password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100" id="login-btn">
                    <span class="login-btn-text">
                        <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                    </span>
                    <span class="login-btn-loading d-none">
                        <span class="spinner-border spinner-border-sm me-1" role="status"></span>
                        Signing in...
                    </span>
                </button>
            </form>

            <div class="login-sso-note">
                <i class="bi bi-shield-lock-fill me-1"></i>
                Authenticated via Keycloak SSO
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleTheme() {
            var html = document.documentElement;
            var current = html.getAttribute('data-bs-theme');
            var next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-bs-theme', next);
            localStorage.setItem('theme', next);
        }

        document.getElementById('login-form').addEventListener('submit', function() {
            var btn = document.getElementById('login-btn');
            btn.querySelector('.login-btn-text').classList.add('d-none');
            btn.querySelector('.login-btn-loading').classList.remove('d-none');
            btn.disabled = true;
        });
    </script>
</body>
</html>
