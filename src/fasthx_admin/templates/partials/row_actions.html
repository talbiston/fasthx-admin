<div class="row-actions-dropdown dropdown">
    <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" title="Actions">
        <i class="bi bi-three-dots-vertical"></i>
    </button>
    <ul class="dropdown-menu dropdown-menu-end">
        <li>
            <a href="/{{ view.name }}/{{ row._id }}" class="dropdown-item">
                <i class="bi bi-eye"></i> View
            </a>
        </li>
        {% if view.can_edit %}
        <li>
            <a href="/{{ view.name }}/{{ row._id }}/edit" class="dropdown-item">
                <i class="bi bi-pencil"></i> Edit
            </a>
        </li>
        {% endif %}
        {% for action in row_actions %}
        <li>
            <button class="dropdown-item"
                    {% if action.get('hx_post') %}
                    hx-post="{{ action.hx_post | replace('{id}', row._id|string) }}"
                    hx-target="{{ action.get('hx_target', 'closest tr') }}"
                    hx-swap="{{ action.get('hx_swap', 'afterend') }}"
                    {% elif action.get('endpoint') %}
                    hx-post="{{ action.endpoint | replace('{id}', row._id|string) }}"
                    hx-swap="afterend"
                    hx-target="closest tr"
                    {% endif %}
                    {% if action.get('confirm') %}
                    hx-confirm="{{ action.confirm }}"
                    {% endif %}>
                {% if action.get('icon') %}<i class="bi bi-{{ action.icon }}"></i>{% endif %}
                {{ action.label }}
            </button>
        </li>
        {% endfor %}
        {% if view.can_delete %}
        <li><hr class="dropdown-divider"></li>
        <li>
            <button class="dropdown-item text-danger"
                    hx-post="/{{ view.name }}/{{ row._id }}/delete"
                    hx-target="closest tr"
                    hx-swap="outerHTML"
                    hx-confirm="Are you sure you want to delete this record?">
                <i class="bi bi-trash"></i> Delete
            </button>
        </li>
        {% endif %}
    </ul>
</div>
